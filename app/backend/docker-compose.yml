services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: easycms-backend-app:local
    container_name: easycms-backend-app
    restart: unless-stopped
    working_dir: /var/www
    user: "0:0"
    command: >
      sh -lc "mkdir -p
      /var/www/storage/logs
      /var/www/storage/framework/cache
      /var/www/storage/framework/sessions
      /var/www/storage/framework/testing
      /var/www/storage/framework/views
      /var/www/bootstrap/cache
      && chmod -R 0777 /var/www/storage /var/www/bootstrap/cache
      && php artisan config:cache
      && php artisan route:cache
      && php artisan event:cache
      && php artisan view:cache
      && php-fpm"
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
      - backend-storage:/var/www/storage
      - backend-bootstrap-cache:/var/www/bootstrap/cache
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
    depends_on:
      - mysql
      - redis
    networks:
      - easycms-backend

  web:
    image: ad5708199ec7
    container_name: easycms-backend-web
    restart: unless-stopped
    ports:
      - "7051:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - backend-storage:/var/www/storage
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
    depends_on:
      - app
    networks:
      - easycms-backend

  mysql:
    image: 3218b38490ce
    container_name: easycms-backend-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: easycms
      MYSQL_USER: easycms
      MYSQL_PASSWORD: easycms123
      MYSQL_ROOT_PASSWORD: root123
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
    ports:
      - "7050:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - easycms-backend

  redis:
    image: 7614ae9453d1
    container_name: easycms-backend-redis
    restart: unless-stopped
    ports:
      - "7052:6379"
    volumes:
      - redis-data:/data
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
    networks:
      - easycms-backend

volumes:
  mysql-data:
  redis-data:
  backend-storage:
  backend-bootstrap-cache:

networks:
  easycms-backend:
    driver: bridge
